server:
  port: 1337

guide:

  # If true, the Guide chatbot will load content from URLs and directories on startup
  reload-content-on-startup: false

  # Projects root: absolute path, or relative to process working directory (e.g. ./embabel-projects)
  projects-path: ./embabel-projects

  # Change to any filename from /src/main/resources/prompts/persona,
  # without the jina extension
  # You can add your own persona files to that directory
  default-persona: adaptive

  # default-provider: OPENAI  # Auto-detected from env vars (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)

  content-chunker:
    include-section-title-in-chunk: false
    max-chunk-size: 4000
    overlap-size: 200
    # Chunks per embedding API call. 50 is safe; increase for speed if no timeouts (max 2048 for OpenAI).
    embedding-batch-size: 50

  # Ingested via load-references (or on startup if reload-content-on-startup is true)
  urls:
    - https://docs.embabel.com/embabel-agent/guide/0.3.5-SNAPSHOT/
    - https://medium.com/@springrod/build-better-agents-in-java-vs-python-embabel-vs-langgraph-f7951a0d855c
    - https://medium.com/@springrod/context-engineering-needs-domain-understanding-b4387e8e4bf8

  # Local directories to ingest (full tree). Paths are absolute or relative to working directory.
  # Example: clone repos then list them here for full-repo RAG.
  directories: []

  tool-groups:


# Spring configuration
# Force web application type (needed because Spring Shell is present)
spring:

  main:
    web-application-type: servlet
  output:
    ansi:
      enabled: always
  profiles:
    active: local  # Change to 'default' in tests to use TestContainers datasource
    config:
      activate:
        on-profile: local


# RAG Adapter Configuration (use "guide" to enable real Guide chatbot, "fake" for testing)
rag:
  adapter:
    type: guide

embabel:
  chat:
    store:
      title-after-message-count: 6

  models:
    # Local ONNX embedding model (no API key needed)
    default-embedding-model: all-MiniLM-L6-v2

    # Fake LLM — real models are resolved per-user via BYOK (UserLlmResolver)
    default-llm: setup-required

  agent:


    rag:
      neo:
        uri: ${NEO4J_URI:bolt://localhost:7687}
        username: ${NEO4J_USERNAME:neo4j}
        password: ${NEO4J_PASSWORD:brahmsian}
        max-chunk-size: 1500
        overlap-size: 200

    logging:
      personality: starwars


  discord:
    token: ${DISCORD_TOKEN}

  shell:
    line-length: 140


logging:
  level:
    com.embabel.agent.rag: INFO
    com.embabel.agent.rag.tools: DEBUG
    com.embabel.agent.rag.pipeline: DEBUG
    # Drivine logging
    org.drivine: WARN
    org.drivine.manager: DEBUG
    org.drivine.transaction: WARN
    # Chat store debugging
    com.embabel.chat.store: DEBUG
    # WebSocket and Chat logging
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO
    com.embabel.guide.chat: DEBUG

# Data-source below is used then the 'local' config is active

database:
  dataSources:
    neo:
      type: NEO4J
      userName: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:brahmsian}
      host: ${NEO4J_HOST:localhost}
      port: 7687
      databaseName: neo4j
