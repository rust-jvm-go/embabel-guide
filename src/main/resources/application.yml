server:
  port: 1337

# Actuator endpoints for health checks and monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

guide:

  cors:
    allowed-origins: ${GUIDE_CORS_ALLOWED_ORIGINS:}

  # If true, the Guide chatbot will load content from URLs and directories on startup
  reload-content-on-startup: false

  # Projects root: absolute path, or relative to process working directory (e.g. ./embabel-projects)
  projects-path: ./embabel-projects

  # Change to any filename from /src/main/resources/prompts/persona,
  # without the jina extension
  # You can add your own persona files to that directory
  default-persona: adaptive

  # default-provider: OPENAI  # Auto-detected from env vars (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)

  content-chunker:
    include-section-title-in-chunk: false
    max-chunk-size: 4000
    overlap-size: 200
    # Chunks per embedding API call. 50 is safe; increase for speed if no timeouts (max 2048 for OpenAI).
    embedding-batch-size: 50

  # Ingested via load-references (or on startup if reload-content-on-startup is true)
  content:
    versioned:
      base-url: https://docs.embabel.com/embabel-agent/guide/
      versions:
        - 0.4.0-SNAPSHOT
    supplementary:
      - https://raw.githubusercontent.com/liberation-data/drivine4j/refs/heads/main/README.md
      # @springrod blog posts
      - https://medium.com/@springrod/embabel-a-new-agent-platform-for-the-jvm-1c83402e0014
      - https://medium.com/@springrod/production-ready-gen-ai-beyond-the-python-prototype-439bf213a8c0
      - https://medium.com/@springrod/building-reliable-agentic-systems-part-i-b056d5b59392
      - https://medium.com/@springrod/the-embabel-vision-967654f13793
      - https://medium.com/@springrod/ai-for-your-gen-ai-how-and-why-embabel-plans-3930244218f6
      - https://medium.com/@springrod/build-better-agents-in-java-vs-python-embabel-vs-langgraph-f7951a0d855c
      - https://medium.com/@springrod/ground-your-ai-transformation-on-what-works-today-bfc525418118
      - https://medium.com/@springrod/from-alchemy-to-engineering-building-type-safe-gen-ai-applications-with-embabel-c3d89b7c989f
      - https://medium.com/@springrod/building-a-chatbot-with-embabel-agentic-rag-b26a8346cb16
      - https://medium.com/@springrod/rethinking-rag-pipelines-are-the-past-agentic-is-the-future-77c887414621
      - https://medium.com/@springrod/dont-talk-english-to-your-llm-ecbfe954bea1
      - https://medium.com/@springrod/why-you-should-use-local-models-a3fce1124c94
      - https://medium.com/@springrod/you-can-build-better-ai-agents-in-java-than-python-868eaf008493
      - https://medium.com/@springrod/embabel-year-end-update-building-the-best-agent-framework-25ed98728e79
      - https://medium.com/@springrod/building-stateful-ai-agents-how-to-create-interactive-mcp-tools-with-embabel-0dfbd3037cf7
      - https://medium.com/@springrod/context-engineering-needs-domain-understanding-b4387e8e4bf8
      - https://medium.com/the-composition/software-that-writes-and-evolves-software-953578a6fc36
      # Embabel publication
      - https://medium.com/embabel/agent-memory-is-not-a-greenfield-problem-ground-it-in-your-existing-data-9272cabe1561
      # @jasper.blues / Embabel publication
      - https://medium.com/embabel/from-docs-to-dialog-2b613901db60
      - https://medium.com/embabel/the-very-slowly-ticking-time-bomb-in-your-graph-persistence-stack-6da1a8da9515
      - https://medium.com/embabel/the-voice-the-word-and-the-wheel-d6e2ef2ab26e

  # Route specific URL patterns through alternate fetchers.
  # Medium is handled programmatically by MediumArchiveContentFetcher
  # (registered in RagConfiguration), which walks per-author monthly RSS
  # archives to retrieve articles aged out of the main feed.
  fetch-routes: []

  # Local directories to ingest (full tree). Paths are absolute or relative to working directory.
  # Example: clone repos then list them here for full-repo RAG.
  directories: []

  tool-groups:

  email:
    sendgrid-api-key: ${SENDGRID_API_KEY:}
    from-email: ${SENDGRID_FROM_EMAIL:noreply@embabel.com}
    frontend-url: ${FRONTEND_URL:http://localhost:3000}

  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/callback/google}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:3000/auth/callback/github}


# Spring configuration
# Force web application type (needed because Spring Shell is present)
spring:

  main:
    web-application-type: servlet
  output:
    ansi:
      enabled: always
  profiles:
    active: local  # Change to 'default' in tests to use TestContainers datasource
    config:
      activate:
        on-profile: local


# RAG Adapter Configuration (use "guide" to enable real Guide chatbot, "fake" for testing)
rag:
  adapter:
    type: guide

embabel:
  chat:
    store:
      title-after-message-count: 6

  models:
    # Local ONNX embedding model (no API key needed)
    default-embedding-model: all-MiniLM-L6-v2

    # Fake LLM — real models are resolved per-user via BYOK (UserLlmResolver)
    default-llm: setup-required

  agent:

    platform:
      models:
        onnx:
          embeddings:
            cache-dir: ${user.home}/.embabel/models

    rag:
      neo:
        uri: ${NEO4J_URI:bolt://localhost:7687}
        username: ${NEO4J_USERNAME:neo4j}
        password: ${NEO4J_PASSWORD:brahmsian}
        max-chunk-size: 1500
        overlap-size: 200

    logging:
      personality: starwars


  discord:
    token: ${DISCORD_TOKEN}

  shell:
    line-length: 140


logging:
  level:
    com.embabel.agent.rag: INFO
    com.embabel.agent.rag.tools: DEBUG
    com.embabel.agent.rag.pipeline: DEBUG
    # Drivine logging
    org.drivine: WARN
    org.drivine.manager: DEBUG
    org.drivine.transaction: WARN
    # Chat store debugging
    com.embabel.chat.store: DEBUG
    # WebSocket and Chat logging
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO
    com.embabel.guide.chat: DEBUG

# Data-source below is used then the 'local' config is active

database:
  dataSources:
    neo:
      type: NEO4J
      userName: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:brahmsian}
      host: ${NEO4J_HOST:localhost}
      port: 7687
      protocol: ${NEO4J_PROTOCOL:bolt}
      databaseName: neo4j
